<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاسراء التعليمية</title>
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --gray: #1a1a1a; --text: #e0e0e0; }
        body { margin: 0; background: var(--black); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* الهيدر والقائمة */
        header { background: var(--gray); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 30px; cursor: pointer; color: var(--gold); display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        /* الأزرار */
        .btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ff4d4d; color: white; }

        /* القائمة الجانبية (Sidenav) */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; right: 0; background-color: var(--gray); overflow-x: hidden; transition: 0.5s; padding-top: 60px; border-left: 1px solid var(--gold); }
        .sidenav a { padding: 15px 30px; text-decoration: none; font-size: 20px; color: var(--text); display: block; transition: 0.3s; }
        .sidenav a:hover { color: var(--gold); background: #252525; }
        .sidenav .closebtn { position: absolute; top: 0; left: 25px; font-size: 36px; margin-left: 50px; }

        /* الأقسام */
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .section { display: none; }
        .active-section { display: block; }

        /* الكروت */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--gray); border: 1px solid #333; border-radius: 10px; padding: 20px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .card h3 { color: var(--gold); margin-top: 0; }

        /* المدخلات */
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }

        /* التوقيع */
        footer { text-align: center; padding: 50px; border-top: 1px solid #333; margin-top: 50px; }
        .signature { font-size: 35px; color: var(--gold); font-weight: 900; text-shadow: 2px 2px 10px #000; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div id="guest-menu">
        <a href="#" onclick="showPage('login')">تسجيل دخول</a>
        <a href="#" onclick="showPage('register')">إنشاء حساب جديد</a>
    </div>
    <div id="user-menu" style="display:none">
        <a href="#" onclick="showPage('home')">الكورسات المتاحة</a>
        <a href="#" onclick="showPage('my-courses')">دروسي</a>
        <a href="#" id="admin-link" style="display:none; color:var(--gold)" onclick="showPage('admin')">لوحة التحكم (حسام)</a>
        <a href="#" onclick="logout()">تسجيل خروج</a>
    </div>
</div>

<header>
    <div class="menu-btn" onclick="openNav()"><span>&#9776;</span> <span style="font-size:16px">القائمة</span></div>
    <div class="logo">الاسراء التعليمية</div>
</header>

<div class="container">
    
    <!-- صفحة البداية / الكورسات العامة -->
    <div id="home" class="section active-section">
        <h1 class="gold-text">الكورسات المتاحة</h1>
        <div id="public-courses-grid" class="grid"></div>
    </div>

    <!-- صفحة تسجيل الدخول -->
    <div id="login" class="section">
        <div style="max-width:400px; margin:auto; background:var(--gray); padding:30px; border-radius:10px;">
            <h2>تسجيل الدخول</h2>
            <input type="text" id="log-phone" placeholder="رقم الهاتف">
            <input type="password" id="log-pass" placeholder="كلمة السر">
            <button class="btn" style="width:100%" onclick="login()">دخول</button>
        </div>
    </div>

    <!-- صفحة إنشاء حساب -->
    <div id="register" class="section">
        <div style="max-width:400px; margin:auto; background:var(--gray); padding:30px; border-radius:10px;">
            <h2>إنشاء حساب جديد</h2>
            <input type="text" id="reg-name" placeholder="اسم الطالب">
            <input type="text" id="reg-phone" placeholder="رقم الهاتف">
            <input type="text" id="reg-parent" placeholder="رقم ولي الأمر">
            <input type="password" id="reg-pass" placeholder="كلمة السر">
            <button class="btn" style="width:100%" onclick="register()">تسجيل الآن</button>
        </div>
    </div>

    <!-- لوحة الأدمن (حسام) -->
    <div id="admin" class="section">
        <h1>لوحة تحكم الأدمن حسام</h1>
        <div class="grid">
            <div class="card">
                <h3>إضافة كورس جديد</h3>
                <input type="text" id="c-name" placeholder="اسم الكورس">
                <input type="number" id="c-price" placeholder="السعر">
                <button class="btn" onclick="addCourse()">إضافة</button>
            </div>
            <div class="card">
                <h3>إضافة درس لكورس</h3>
                <select id="target-course"></select>
                <input type="text" id="l-title" placeholder="عنوان الدرس">
                <input type="text" id="l-video" placeholder="رابط فيديو (يوتيوب)">
                <input type="text" id="l-pdf" placeholder="رابط PDF">
                <button class="btn" onclick="addLesson()">إضافة الدرس</button>
            </div>
        </div>
        <hr>
        <h2>إدارة الطلاب المسجلين</h2>
        <div id="admin-students" class="grid"></div>
        <hr>
        <h2>إدارة الكورسات</h2>
        <div id="admin-courses" class="grid"></div>
    </div>

    <!-- لوحة الطالب -->
    <div id="my-courses" class="section">
        <h1>دروسي المشترك بها</h1>
        <div id="student-courses-grid" class="grid"></div>
    </div>
</div>

<footer>
    <div class="signature">ميس اسراء فرج</div>
</footer>

<script>
    // الأدمن الأساسي
    const ADMIN_CRED = { phone: "01040672314", pass: "01040672314" }; // الباسورد هو الرقم أيضاً

    // قاعدة البيانات (تحميل من المتصفح)
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let courses = JSON.parse(localStorage.getItem('courses')) || [];
    let currentUser = null;

    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        closeNav();
        if(id === 'admin') renderAdmin();
        if(id === 'home') renderPublic();
        if(id === 'my-courses') renderStudent();
    }

    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

    // نظام الحسابات
    function register() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const parent = document.getElementById('reg-parent').value;
        const pass = document.getElementById('reg-pass').value;

        if(users.find(u => u.phone === phone)) return alert("هذا الرقم مسجل مسبقاً!");
        
        users.push({ name, phone, parent, pass, active: false, myCourses: [] });
        localStorage.setItem('users', JSON.stringify(users));
        alert("تم إنشاء الحساب بنجاح! انتظر تفعيل الأدمن.");
        showPage('login');
    }

    function login() {
        const phone = document.getElementById('log-phone').value;
        const pass = document.getElementById('log-pass').value;

        if(phone === ADMIN_CRED.phone && pass === ADMIN_CRED.pass) {
            currentUser = { name: "حسام (أدمن)", phone: phone, isAdmin: true };
            document.getElementById('admin-link').style.display = 'block';
        } else {
            const user = users.find(u => u.phone === phone && u.pass === pass);
            if(!user) return alert("خطأ في البيانات!");
            if(!user.active) return alert("حسابك لم يتم تفعيله بعد من قبل ميس اسراء!");
            currentUser = user;
        }

        document.getElementById('guest-menu').style.display = 'none';
        document.getElementById('user-menu').style.display = 'block';
        alert("أهلاً بك " + currentUser.name);
        showPage('home');
    }

    // إدارة الكورسات
    function addCourse() {
        const name = document.getElementById('c-name').value;
        const price = document.getElementById('c-price').value;
        courses.push({ id: Date.now(), name, price, lessons: [] });
        localStorage.setItem('courses', JSON.stringify(courses));
        renderAdmin();
    }

    function deleteCourse(id) {
        courses = courses.filter(c => c.id !== id);
        localStorage.setItem('courses', JSON.stringify(courses));
        renderAdmin();
    }

    function addLesson() {
        const cId = document.getElementById('target-course').value;
        const title = document.getElementById('l-title').value;
        const video = document.getElementById('l-video').value;
        const pdf = document.getElementById('l-pdf').value;

        const course = courses.find(c => c.id == cId);
        course.lessons.push({ title, video, pdf });
        localStorage.setItem('courses', JSON.stringify(courses));
        alert("تم إضافة الدرس بنجاح!");
    }

    // تفعيل الطلاب
    function toggleUser(phone) {
        const user = users.find(u => u.phone === phone);
        user.active = !user.active;
        localStorage.setItem('users', JSON.stringify(users));
        renderAdmin();
    }

    // العرض
    function renderAdmin() {
        const sDiv = document.getElementById('admin-students');
        sDiv.innerHTML = users.map(u => `
            <div class="card">
                <h3>${u.name}</h3>
                <p>هاتف: ${u.phone}</p>
                <p>ولي أمر: ${u.parent}</p>
                <button class="btn ${u.active ? 'btn-danger' : ''}" onclick="toggleUser('${u.phone}')">
                    ${u.active ? 'إلغاء التفعيل' : 'تفعيل الحساب ✅'}
                </button>
            </div>
        `).join('');

        const cDiv = document.getElementById('admin-courses');
        cDiv.innerHTML = courses.map(c => `
            <div class="card">
                <h3>${c.name}</h3>
                <p>السعر: ${c.price} ج.م</p>
                <button class="btn btn-danger" onclick="deleteCourse(${c.id})">حذف الكورس 🗑️</button>
            </div>
        `).join('');

        const select = document.getElementById('target-course');
        select.innerHTML = courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function renderPublic() {
        const grid = document.getElementById('public-courses-grid');
        grid.innerHTML = courses.map(c => `
            <div class="card">
                <h3>${c.name}</h3>
                <p>سعر الكورس: ${c.price} ج.م</p>
                <p style="font-size:12px; color:gray">سجل دخولك للتواصل والاشتراك</p>
            </div>
        `).join('');
    }

    function renderStudent() {
        const grid = document.getElementById('student-courses-grid');
        // هنا يمكنك إضافة منطق لجعل الطالب يرى الكورسات التي فعلتها له
        grid.innerHTML = "<p>تواصل مع ميس اسراء لتفعيل اشتراكك في الكورسات.</p>";
    }

    function logout() { location.reload(); }

    renderPublic();
</script>
</body>
</html>
