<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية الإسراء التعليمية | ميس اسراء فرج</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --dark: #121212; --text: #f0f0f0; }
        body { margin: 0; background: var(--black); color: var(--text); font-family: 'Cairo', sans-serif; user-select: none; }
        header { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .menu-icon { font-size: 30px; color: var(--gold); cursor: pointer; }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); }
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: var(--dark); overflow-x: hidden; transition: 0.5s; padding-top: 60px; border-left: 2px solid var(--gold); }
        .sidenav a { padding: 15px 30px; text-decoration: none; font-size: 20px; color: var(--text); display: block; border-bottom: 1px solid #222; }
        .container { padding: 20px; max-width: 1200px; margin: auto; min-height: 80vh; }
        .section { display: none; } .active-section { display: block; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .course-card { background: var(--dark); border-radius: 20px; overflow: hidden; border: 1px solid #333; transition: 0.3s; text-align: center; }
        .course-img { width: 100%; height: 170px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .btn { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #vid-cont { position: relative; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); background: #000; }
        #wm-layer { position: absolute; z-index: 99; color: rgba(212, 175, 55, 0.2); font-weight: bold; pointer-events: none; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        footer { text-align: center; padding: 60px; border-top: 1px solid #222; margin-top: 40px; }
        .mrs-esraa { font-size: 40px; color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" style="font-size:36px" onclick="closeNav()">&times;</a>
    <div id="guest-links">
        <a href="#" onclick="showPage('login')">تسجيل دخول</a>
        <a href="#" onclick="showPage('register')">إنشاء حساب جديد</a>
    </div>
    <div id="user-links" style="display:none">
        <a href="#" onclick="showPage('home')">الرئيسية</a>
        <a href="#" id="admin-link" style="display:none; color:gold" onclick="showPage('admin')">لوحة تحكم حسام</a>
        <a href="#" onclick="location.reload()">تسجيل خروج</a>
    </div>
</div>

<header>
    <div class="menu-icon" onclick="openNav()">&#9776; القائمة</div>
    <div class="logo">الاسراء التعليمية</div>
</header>

<div class="container">
    <div id="home" class="section active-section">
        <h1 style="color:var(--gold)">الكورسات المتاحة</h1>
        <div id="public-grid" class="courses-grid">جاري تحميل البيانات...</div>
    </div>
    <!-- بقية الأقسام (تسجيل، دخول، أدمن، درس) ستعمل تلقائياً بمجرد الربط -->
    <div id="login" class="section">
        <div style="max-width:400px; margin:auto; background:var(--dark); padding:30px; border-radius:20px; border:1px solid var(--gold);">
            <h2>تسجيل الدخول</h2>
            <input type="text" id="log-phone" placeholder="رقم الموبايل">
            <input type="password" id="log-pass" placeholder="كلمة السر">
            <button class="btn" onclick="login()">دخول</button>
        </div>
    </div>
    <div id="register" class="section">
        <div style="max-width:400px; margin:auto; background:var(--dark); padding:30px; border-radius:20px; border:1px solid var(--gold);">
            <h2>إنشاء حساب</h2>
            <input type="text" id="reg-name" placeholder="اسم الطالب">
            <input type="text" id="reg-phone" placeholder="رقم الهاتف">
            <input type="password" id="reg-pass" placeholder="كلمة السر">
            <button class="btn" onclick="register()">تسجيل</button>
        </div>
    </div>
    <div id="admin" class="section">
        <h1 style="color:var(--gold)">لوحة تحكم حسام</h1>
        <div class="card"><input type="text" id="c-name" placeholder="اسم الكورس"><input type="text" id="c-img" placeholder="رابط الصورة"><input type="number" id="c-price" placeholder="السعر"><button class="btn" onclick="addCourse()">إضافة كورس</button></div>
        <div class="card"><select id="sel-c-target"></select><input type="text" id="l-title" placeholder="عنوان الدرس"><input type="text" id="l-vid" placeholder="يوتيوب"><input type="text" id="l-pdf" placeholder="رابط PDF"><textarea id="l-text" placeholder="شرح"></textarea><button class="btn" onclick="addLesson()">نشر درس</button></div>
        <div id="admin-students"></div>
    </div>
    <div id="lesson-view" class="section"><button class="btn" onclick="showPage('home')" style="width:auto">🔙 عودة</button><h2 id="view-l-title" style="color:var(--gold)"></h2><div id="vid-cont"><div id="wm-layer"></div><div id="player-frame"></div></div><div id="pdf-area"></div><div id="view-l-text" style="padding:20px; line-height:1.8"></div></div>
</div>

<footer><div class="mrs-esraa">ميس اسراء فرج</div></footer>

<script>
    // استخدم بياناتك بدقة هنا
    const firebaseConfig = {
        apiKey: "AIzaSyDdwnLfJbsQ8hbXP-CzocjaejmvYC4FOh4",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebaseio.com", // تأكد من وجود https:// في البداية
        projectId: "alesraa-academy",
        storageBucket: "alesraa-academy.firebasestorage.app",
        messagingSenderId: "158593983527",
        appId: "1:158593983527:web:ec8db56d6268d545109a02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let users = [], courses = [], currentUser = null;

    // جلب البيانات مع معالجة حالة الفراغ
    db.ref('courses').on('value', (snap) => {
        const data = snap.val();
        courses = data ? Object.values(data) : [];
        const grid = document.getElementById('public-grid');
        if (courses.length === 0) {
            grid.innerHTML = "<p>لا توجد كورسات مضافة حالياً. ادخل كأدمن لإضافة أول كورس.</p>";
        } else {
            renderPublic();
        }
        if(currentUser && currentUser.isAdmin) renderAdmin();
    }, (error) => {
        document.getElementById('public-grid').innerHTML = "خطأ في الاتصال: تأكد من إعدادات Rules في Firebase";
    });

    db.ref('users').on('value', (snap) => {
        const data = snap.val();
        users = data ? Object.values(data) : [];
    });

    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
    function showPage(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); closeNav(); }

    function renderPublic() {
        document.getElementById('public-grid').innerHTML = courses.map(c => `
            <div class="course-card">
                <img src="${c.img || 'https://placeholder.com'}" class="course-img">
                <div style="padding:15px"><h3>${c.name}</h3><p>السعر: ${c.price} ج.م</p><button class="btn" onclick="openCourse('${c.id}')">دخول</button></div>
            </div>
        `).join('');
    }

    function addCourse() {
        const id = Date.now().toString();
        db.ref('courses/' + id).set({ id, name: document.getElementById('c-name').value, img: document.getElementById('c-img').value, price: document.getElementById('c-price').value, lessons: [] })
        .then(() => alert("تمت الإضافة بنجاح!"));
    }

    function login() {
        const p = document.getElementById('log-phone').value, s = document.getElementById('log-pass').value;
        if(p === "01040672314" && s === "01040672314") {
            currentUser = { name: "حسام", isAdmin: true, phone: p };
            document.getElementById('admin-link').style.display = 'block';
        } else {
            const u = users.find(x => x.phone === p && x.pass === s);
            if(!u || !u.active) return alert("خطأ أو الحساب غير مفعل");
            currentUser = u;
        }
        document.getElementById('guest-links').style.display = 'none';
        document.getElementById('user-links').style.display = 'block';
        showPage('home');
    }

    // بقية الدوال (register, addLesson, viewLesson, etc.)
    function register() {
        const p = document.getElementById('reg-phone').value;
        db.ref('users/' + p).set({ name: document.getElementById('reg-name').value, phone: p, pass: document.getElementById('reg-pass').value, active: false, myCourses: [""] })
        .then(() => { alert("تم التسجيل! بانتظار تفعيل حسام"); showPage('login'); });
    }

    function addLesson() {
        const cId = document.getElementById('sel-c-target').value;
        const course = courses.find(c => c.id == cId);
        if(!course.lessons) course.lessons = [];
        course.lessons.push({ title: document.getElementById('l-title').value, vid: document.getElementById('l-vid').value, pdf: document.getElementById('l-pdf').value, text: document.getElementById('l-text').value });
        db.ref('courses/' + cId).set(course).then(() => alert("تم النشر!"));
    }

    function renderAdmin() {
        document.getElementById('sel-c-target').innerHTML = courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('admin-students').innerHTML = "<h3>تفعيل الطلاب:</h3>" + users.map(u => `
            <div style="background:#111; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between">
                <span>${u.name}</span><button onclick="db.ref('users/${u.phone}/active').set(${!u.active})">${u.active?'إيقاف':'تفعيل'}</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
