<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاسراء التعليمية</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --dark: #121212; --text: #f0f0f0; }
        body { margin: 0; background: var(--black); color: var(--text); font-family: 'Cairo', sans-serif; user-select: none; }
        header { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .menu-icon { font-size: 30px; color: var(--gold); cursor: pointer; }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); }
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: var(--dark); overflow-x: hidden; transition: 0.5s; padding-top: 60px; border-left: 2px solid var(--gold); }
        .sidenav a { padding: 15px 30px; text-decoration: none; font-size: 18px; color: var(--text); display: block; border-bottom: 1px solid #222; text-align: right; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .section { display: none; }
        .active-section { display: block !important; }
        .card { background: var(--dark); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        #vid-cont { position: relative; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; }
        #wm-layer { position: absolute; z-index: 99; color: rgba(212, 175, 55, 0.2); font-weight: bold; pointer-events: none; }
        footer { text-align: center; padding: 50px; border-top: 1px solid #222; color: var(--gold); font-size: 35px; font-weight: 900; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" style="font-size:36px; text-align:left" onclick="closeNav()">&times;</a>
    <div id="menu-content">
        <!-- القائمة تتغير حسب تسجيل الدخول -->
    </div>
</div>

<header>
    <div class="menu-icon" onclick="openNav()">&#9776; القائمة</div>
    <div class="logo">الاسراء التعليمية</div>
</header>

<div class="container">
    <!-- 1. الرئيسية -->
    <div id="home-page" class="section active-section">
        <h1 style="color:var(--gold)">الكورسات المتاحة</h1>
        <div id="public-grid" class="courses-grid">جاري تحميل الكورسات...</div>
    </div>

    <!-- 2. تسجيل دخول -->
    <div id="login-page" class="section">
        <div class="card" style="max-width:400px; margin:auto;">
            <h2 style="text-align:center; color:var(--gold)">تسجيل الدخول</h2>
            <input type="text" id="log-phone" placeholder="رقم الموبايل">
            <input type="password" id="log-pass" placeholder="كلمة السر">
            <button class="btn" onclick="processLogin()">دخول</button>
        </div>
    </div>

    <!-- 3. إنشاء حساب -->
    <div id="reg-page" class="section">
        <div class="card" style="max-width:400px; margin:auto;">
            <h2 style="text-align:center; color:var(--gold)">حساب جديد</h2>
            <input type="text" id="reg-name" placeholder="اسمك">
            <input type="text" id="reg-phone" placeholder="رقم موبايلك">
            <input type="password" id="reg-pass" placeholder="كلمة السر">
            <button class="btn" onclick="processReg()">إنشاء الحساب</button>
        </div>
    </div>

    <!-- 4. لوحة حسام -->
    <div id="admin-page" class="section">
        <h1 style="color:var(--gold)">لوحة تحكم حسام</h1>
        <div class="card">
            <h3>إضافة كورس</h3>
            <input type="text" id="c-name" placeholder="اسم الكورس">
            <input type="text" id="c-img" placeholder="رابط الصورة">
            <input type="number" id="c-price" placeholder="السعر">
            <button class="btn" onclick="submitCourse()">حفظ الكورس</button>
        </div>
        <div class="card">
            <h3>إدارة الكورسات والدروس</h3>
            <div id="admin-manage-list"></div>
        </div>
        <div id="st-list-area" class="card"><h3>الطلاب المسجلين:</h3><div id="st-data"></div></div>
    </div>

    <!-- 5. عرض الدرس -->
    <div id="lesson-page" class="section">
        <button class="btn" onclick="goHome()" style="width:auto">🔙 عودة</button>
        <h2 id="l-title" style="color:var(--gold)"></h2>
        <div id="vid-cont"><div id="wm-layer"></div><div id="l-frame"></div></div>
        <div id="l-text" style="padding:20px; line-height:1.8"></div>
    </div>
</div>

<footer>ميس اسراء فرج</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDdwnLfJbsQ8hbXP-CzocjaejmvYC4FOh4",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebaseio.com",
        projectId: "alesraa-academy",
        storageBucket: "alesraa-academy.firebasestorage.app",
        messagingSenderId: "158593983527",
        appId: "1:158593983527:web:ec8db56d6268d545109a02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let courses = [], users = [], currentUser = null;

    // جلب البيانات
    db.ref('courses').on('value', snap => { courses = snap.val() ? Object.values(snap.val()) : []; renderHome(); if(currentUser?.isAdmin) renderAdmin(); });
    db.ref('users').on('value', snap => { users = snap.val() ? Object.values(snap.val()) : []; if(currentUser?.isAdmin) renderAdmin(); });

    function openNav() { document.getElementById("mySidenav").style.width = "280px"; updateMenu(); }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
    
    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id + '-page').classList.add('active-section');
        closeNav(); window.scrollTo(0,0);
    }

    function updateMenu() {
        const menu = document.getElementById('menu-content');
        if(!currentUser) {
            menu.innerHTML = `<a onclick="showPage('login')">تسجيل دخول</a><a onclick="showPage('reg')">إنشاء حساب</a>`;
        } else {
            menu.innerHTML = `<a onclick="goHome()">الرئيسية</a>`;
            if(currentUser.isAdmin) menu.innerHTML += `<a onclick="showPage('admin')" style="color:gold">لوحة حسام</a>`;
            menu.innerHTML += `<a onclick="location.reload()">خروج</a>`;
        }
    }

    function renderHome() {
        const grid = document.getElementById('public-grid');
        grid.innerHTML = courses.length ? courses.map(c => `
            <div class="card" style="text-align:center">
                <img src="${c.img || ''}" style="width:100%; border-radius:10px">
                <h3>${c.name}</h3>
                <p>${c.price} ج.م</p>
                <button class="btn" onclick="openCourse('${c.id}')">دخول</button>
            </div>
        `).join('') : "<p>لا يوجد كورسات حالياً.</p>";
    }

    function processLogin() {
        const p = document.getElementById('log-phone').value, s = document.getElementById('log-pass').value;
        if(p === "01040672314" && s === "01040672314") {
            currentUser = { name: "حسام", isAdmin: true, phone: p };
            showPage('admin');
        } else {
            const u = users.find(x => x.phone === p && x.pass === s);
            if(!u) return alert("بيانات خطأ");
            if(!u.active) return alert("بانتظار التفعيل");
            currentUser = u; showPage('home');
        }
    }

    function processReg() {
        const p = document.getElementById('reg-phone').value;
        db.ref('users/' + p).set({ name: document.getElementById('reg-name').value, phone: p, pass: document.getElementById('reg-pass').value, active: false, myCourses: ["0"] });
        alert("تم! كلم حسام يفعل الحساب"); showPage('login');
    }

    function submitCourse() {
        const id = Date.now().toString();
        db.ref('courses/' + id).set({ id, name: document.getElementById('c-name').value, img: document.getElementById('c-img').value, price: document.getElementById('c-price').value, lessons: [] });
    }

    function renderAdmin() {
        document.getElementById('admin-manage-list').innerHTML = courses.map(c => `
            <div style="border-bottom:1px solid #444; padding:10px; margin-bottom:10px">
                <b>${c.name}</b> <button onclick="db.ref('courses/${c.id}').remove()">حذف الكورس</button>
            </div>
        `).join('');
        document.getElementById('st-data').innerHTML = users.map(u => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                <span>${u.name}</span> <button onclick="db.ref('users/${u.phone}/active').set(${!u.active})">${u.active?'تعطيل':'تفعيل'}</button>
            </div>
        `).join('');
    }

    function openCourse(id) {
        if(!currentUser) return showPage('login');
        const c = courses.find(x => x.id == id);
        if(!currentUser.isAdmin && !currentUser.myCourses.includes(id)) return alert("اشترك أولاً");
        document.getElementById('public-grid').innerHTML = `<h2>دروس ${c.name}</h2>` + (c.lessons || []).map((l, i) => `
            <div class="card" style="display:flex; justify-content:space-between">
                <span>${l.title}</span> <button class="btn" style="width:auto" onclick="viewL('${c.id}', ${i})">مشاهدة</button>
            </div>
        `).join('');
    }

    function viewL(cId, idx) {
        const l = courses.find(c => c.id == cId).lessons[idx];
        showPage('lesson');
        document.getElementById('l-title').innerText = l.title;
        document.getElementById('l-text').innerText = l.text;
        document.getElementById('l-frame').innerHTML = `<iframe width="100%" height="400" src="${l.vid.replace('watch?v=','embed/')}"></iframe>`;
        const wm = document.getElementById('wm-layer'); wm.style.display = 'block'; wm.innerText = currentUser.phone;
        setInterval(() => { wm.style.left = Math.random()*70+"%"; wm.style.top = Math.random()*70+"%"; }, 3000);
    }

    function goHome() { showPage('home'); renderHome(); }
</script>
</body>
</html>
