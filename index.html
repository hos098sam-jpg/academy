<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية الإسراء التعليمية | ميس اسراء فرج</title>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --dark: #121212; --text: #f0f0f0; --danger: #e74c3c; }
        body { margin: 0; background: var(--black); color: var(--text); font-family: 'Cairo', sans-serif; user-select: none; }
        header { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .menu-icon { font-size: 30px; color: var(--gold); cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); }
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: var(--dark); overflow-x: hidden; transition: 0.5s; padding-top: 60px; border-left: 2px solid var(--gold); }
        .sidenav a { padding: 15px 30px; text-decoration: none; font-size: 20px; color: var(--text); display: block; border-bottom: 1px solid #222; }
        .sidenav .closebtn { position: absolute; top: 10px; left: 25px; font-size: 36px; color: var(--gold); }
        .container { padding: 20px; max-width: 1200px; margin: auto; min-height: 80vh; }
        .section { display: none; } .active-section { display: block; animation: fadeIn 0.5s; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .course-card { background: var(--dark); border-radius: 20px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .course-img { width: 100%; height: 170px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 15px; font-size: 14px; }
        #vid-cont { position: relative; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); background: #000; }
        #wm-layer { position: absolute; z-index: 99; pointer-events: none; color: rgba(212, 175, 55, 0.2); font-weight: bold; display: none; }
        footer { text-align: center; padding: 60px; border-top: 1px solid #222; margin-top: 40px; }
        .mrs-esraa { font-size: 40px; color: var(--gold); font-weight: 900; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div id="guest-links">
        <a href="#" onclick="showPage('login')">تسجيل دخول</a>
        <a href="#" onclick="showPage('register')">إنشاء حساب جديد</a>
    </div>
    <div id="user-links" style="display:none">
        <a href="#" onclick="showPage('home')">الرئيسية (الكورسات)</a>
        <a href="#" id="admin-link" style="display:none; color:gold" onclick="showPage('admin')">لوحة تحكم حسام</a>
        <a href="#" onclick="location.reload()">تسجيل خروج</a>
    </div>
</div>

<header>
    <div class="menu-icon" onclick="openNav()">&#9776; القائمة</div>
    <div class="logo">الاسراء التعليمية</div>
</header>

<div class="container">
    <div id="home" class="section active-section">
        <h1 style="color:var(--gold)">الكورسات المتاحة</h1>
        <div id="public-grid" class="courses-grid"></div>
    </div>

    <div id="login" class="section">
        <div class="card" style="max-width:400px; margin:auto; background:var(--dark); padding:30px; border-radius:20px; border:1px solid var(--gold);">
            <h2 style="color:var(--gold); text-align:center">تسجيل الدخول</h2>
            <input type="text" id="log-phone" placeholder="رقم الموبايل">
            <input type="password" id="log-pass" placeholder="كلمة السر">
            <button class="btn" style="width:100%" onclick="login()">دخول</button>
        </div>
    </div>

    <div id="register" class="section">
        <div class="card" style="max-width:400px; margin:auto; background:var(--dark); padding:30px; border-radius:20px; border:1px solid var(--gold);">
            <h2 style="color:var(--gold); text-align:center">حساب جديد</h2>
            <input type="text" id="reg-name" placeholder="اسم الطالب">
            <input type="text" id="reg-phone" placeholder="رقم الهاتف">
            <input type="password" id="reg-pass" placeholder="كلمة السر">
            <button class="btn" style="width:100%" onclick="register()">إنشاء</button>
        </div>
    </div>

    <div id="admin" class="section">
        <h1 style="color:var(--gold)">لوحة تحكم حسام</h1>
        <div class="card" style="background:#111; padding:20px; border-radius:15px; margin-bottom:20px">
            <h3>إضافة كورس جديد</h3>
            <input type="text" id="c-name" placeholder="اسم الكورس">
            <input type="text" id="c-img" placeholder="رابط صورة الكورس">
            <input type="number" id="c-price" placeholder="السعر">
            <button class="btn" onclick="addCourse()">إضافة</button>
        </div>
        <div class="card" style="background:#111; padding:20px; border-radius:15px;">
            <h3>نشر درس جديد (إضافة دروس بلا حدود)</h3>
            <select id="sel-c-target"></select>
            <input type="text" id="l-title" placeholder="عنوان الدرس">
            <input type="text" id="l-vid" placeholder="رابط يوتيوب">
            <textarea id="l-text" placeholder="شرح الدرس المكتوب..."></textarea>
            <button class="btn" onclick="addLesson()">نشر الدرس داخل الكورس</button>
        </div>
        <div id="manage-area" style="margin-top:30px">
            <h3>إدارة الكورسات الحالية:</h3>
            <div id="admin-courses-list" class="courses-grid"></div>
        </div>
        <div id="admin-students" style="margin-top:30px"></div>
    </div>

    <div id="lesson-view" class="section">
        <button class="btn" onclick="showPage('home')" style="margin-bottom:20px">🔙 عودة</button>
        <h2 id="view-l-title" style="color:var(--gold)"></h2>
        <div id="vid-cont"><div id="wm-layer"></div><div id="player-frame"></div></div>
        <div id="view-l-text" style="padding:20px; line-height:1.8; background:#111; border-radius:15px; margin-top:20px"></div>
    </div>
</div>

<footer><div class="mrs-esraa">ميس اسراء فرج</div></footer>

<script>
    const ADMIN_DATA = { p: "01040672314", s: "01040672314" };
    let users = JSON.parse(localStorage.getItem('es_v9_users')) || [];
    let courses = JSON.parse(localStorage.getItem('es_v9_courses')) || [];
    let currentUser = null;

    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        closeNav();
        if(id === 'home') renderPublic();
        if(id === 'admin') renderAdmin();
    }

    function renderPublic() {
        const grid = document.getElementById('public-grid');
        grid.innerHTML = courses.map(c => `
            <div class="course-card">
                <img src="${c.img || 'https://placeholder.com'}" class="course-img">
                <div style="padding:15px; text-align:center">
                    <h3>${c.name}</h3>
                    <p>السعر: ${c.price} ج.م</p>
                    <button class="btn" onclick="openCourse(${c.id})">دخول الكورس</button>
                </div>
            </div>
        `).join('');
    }

    function addCourse() {
        const name = document.getElementById('c-name').value;
        const img = document.getElementById('c-img').value;
        const price = document.getElementById('c-price').value;
        courses.push({ id: Date.now(), name, img, price, lessons: [] });
        save(); renderAdmin(); renderPublic();
    }

    function deleteCourse(id) {
        if(confirm("هل أنت متأكد من حذف الكورس نهائياً؟")) {
            courses = courses.filter(c => c.id !== id);
            save(); renderAdmin(); renderPublic();
        }
    }

    function addLesson() {
        const cId = document.getElementById('sel-c-target').value;
        const title = document.getElementById('l-title').value;
        const vid = document.getElementById('l-vid').value;
        const text = document.getElementById('l-text').value;
        const course = courses.find(c => c.id == cId);
        course.lessons.push({ title, vid, text });
        save(); alert("تم إضافة الدرس بنجاح!");
    }

    function renderAdmin() {
        document.getElementById('sel-c-target').innerHTML = courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        const cList = document.getElementById('admin-courses-list');
        cList.innerHTML = courses.map(c => `
            <div class="course-card" style="padding:10px; text-align:center">
                <h4>${c.name}</h4>
                <button class="btn-danger" onclick="deleteCourse(${c.id})">حذف الكورس 🗑️</button>
            </div>
        `).join('');
    }

    function login() {
        const p = document.getElementById('log-phone').value;
        const s = document.getElementById('log-pass').value;
        if(p === ADMIN_DATA.p && s === ADMIN_DATA.s) {
            currentUser = { name: "حسام", isAdmin: true, phone: p };
            document.getElementById('admin-link').style.display = 'block';
        } else {
            let u = users.find(x => x.phone === p && x.pass === s);
            if(!u || !u.active) return alert("خطأ أو الحساب غير مفعل");
            currentUser = u;
        }
        document.getElementById('guest-links').style.display = 'none';
        document.getElementById('user-links').style.display = 'block';
        showPage('home');
    }

    function openCourse(id) {
        if(!currentUser) return showPage('login');
        const c = courses.find(x => x.id == id);
        document.getElementById('public-grid').innerHTML = `<h2>دروس الكورس</h2>` + c.lessons.map((l, i) => `
            <div style="background:#111; padding:15px; margin-bottom:10px; border-radius:10px; display:flex; justify-content:space-between">
                <span>الدرس ${i+1}: ${l.title}</span>
                <button class="btn" onclick="viewLesson(${id}, ${i})">بدء</button>
            </div>
        `).join('');
    }

    function viewLesson(cId, lIdx) {
        const lesson = courses.find(c => c.id == cId).lessons[lIdx];
        showPage('lesson-view');
        document.getElementById('view-l-title').innerText = lesson.title;
        document.getElementById('view-l-text').innerText = lesson.text;
        document.getElementById('player-frame').innerHTML = `<iframe width="100%" height="400" src="${lesson.vid.replace('watch?v=','embed/')}"></iframe>`;
    }

    function register() {
        users.push({ name: document.getElementById('reg-name').value, phone: document.getElementById('reg-phone').value, pass: document.getElementById('reg-pass').value, active: false });
        save(); alert("تم! بانتظار تفعيل حسام"); showPage('login');
    }

    function save() { localStorage.setItem('es_v9_users', JSON.stringify(users)); localStorage.setItem('es_v9_courses', JSON.stringify(courses)); }
    renderPublic();
</script>
</body>
</html>
