<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاسراء التعليمية - الاحترافية</title>
    <style>
        :root { --gold: #D4AF37; --black: #050505; --dark: #121212; --gold-dark: #996515; }
        body { margin: 0; background: var(--black); color: #fff; font-family: 'Segoe UI', Tahoma; user-select: none; }
        
        header { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 26px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* واترمارك حماية الفيديو */
        #watermark { position: absolute; color: rgba(212, 175, 55, 0.3); pointer-events: none; z-index: 9999; font-size: 14px; white-space: nowrap; display: none; }

        .btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--gold-dark); transform: scale(1.05); }

        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .card { background: var(--dark); border: 1px solid #222; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }

        .section { display: none; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* التوقيع الفخم */
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid #222; }
        .mrs-esraa { font-size: 45px; color: var(--gold); font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"></div>

<header>
    <div class="logo">الاسراء التعليمية</div>
    <div id="nav-btns">
        <button class="btn" onclick="showPage('home')">الرئيسية</button>
        <button class="btn" id="profile-btn" style="display:none" onclick="showPage('profile')">ملفي الشخصي</button>
        <button class="btn" id="admin-btn" style="display:none" onclick="showPage('admin')">لوحة حسام</button>
        <button class="btn" onclick="logout()">خروج</button>
    </div>
</header>

<div class="container">
    <!-- شاشة الدخول -->
    <div id="auth" class="section active">
        <div class="card" style="max-width: 450px; margin: 100px auto; text-align: center;">
            <h2 style="color:var(--gold)">تسجيل الدخول / إنشاء حساب</h2>
            <input type="text" id="u-name" placeholder="اسمك">
            <input type="text" id="u-phone" placeholder="رقم هاتفك">
            <input type="password" id="u-pass" placeholder="كلمة السر">
            <button class="btn" style="width:100%" onclick="handleAuth()">دخول للمنصة</button>
        </div>
    </div>

    <!-- لوحة الأدمن حسام -->
    <div id="admin" class="section">
        <h1 style="color:var(--gold)">لوحة التحكم الإدارية</h1>
        <div class="card">
            <h3>إضافة كورس جديد</h3>
            <input type="text" id="new-c-name" placeholder="اسم الكورس">
            <input type="number" id="new-c-price" placeholder="السعر">
            <button class="btn" onclick="createNewCourse()">إنشاء الكورس</button>
        </div>
        <div class="card">
            <h3>إضافة درس + امتحان</h3>
            <select id="select-course"></select>
            <input type="text" id="lesson-title" placeholder="عنوان الدرس">
            <input type="text" id="video-link" placeholder="رابط فيديو (يوتيوب/درايف)">
            <textarea id="quiz-data" placeholder="الامتحان بصيغة: السؤال|إجابة1,إجابة2,إجابة3|الإجابة الصحيحة"></textarea>
            <button class="btn" onclick="addFullLesson()">حفظ الدرس والامتحان</button>
        </div>
        <div id="students-list"></div>
    </div>

    <!-- الملف الشخصي للطالب -->
    <div id="profile" class="section">
        <h1 style="color:var(--gold)">ملفك الشخصي 🎓</h1>
        <div id="student-data" class="card"></div>
        <h3>كورساتي المشترك بها:</h3>
        <div id="my-courses-list"></div>
    </div>

    <!-- منطقة عرض الكورس والدروس -->
    <div id="course-view" class="section">
        <button class="btn" onclick="showPage('profile')">🔙 العودة</button>
        <h2 id="view-c-title" style="color:var(--gold)"></h2>
        <div id="lessons-container"></div>
    </div>
</div>

<footer>
    <div class="mrs-esraa">ميس اسراء فرج</div>
</footer>

<script>
    const ADMIN_PHONE = "01040672314";
    let users = JSON.parse(localStorage.getItem('es_users')) || [];
    let courses = JSON.parse(localStorage.getItem('es_courses')) || [];
    let currentUser = null;

    function handleAuth() {
        const name = document.getElementById('u-name').value;
        const phone = document.getElementById('u-phone').value;
        const pass = document.getElementById('u-pass').value;

        if(!name || !phone) return;

        let user = users.find(u => u.phone === phone);
        if(!user) {
            user = { name, phone, pass, isAdmin: (phone === ADMIN_PHONE), active: (phone === ADMIN_PHONE), myCourses: [], results: [] };
            users.push(user);
            localStorage.setItem('es_users', JSON.stringify(users));
        }

        if(user.pass !== pass) return alert("كلمة السر خطأ");
        if(!user.active) return alert("حسابك بانتظار تفعيل ميس اسراء");

        currentUser = user;
        loginSuccess();
    }

    function loginSuccess() {
        document.getElementById('auth').classList.remove('active');
        document.getElementById('profile-btn').style.display = 'inline';
        if(currentUser.isAdmin) document.getElementById('admin-btn').style.display = 'inline';
        
        startWatermark();
        showPage('profile');
    }

    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'profile') renderProfile();
        if(id === 'admin') renderAdmin();
    }

    // وظائف الأدمن
    function createNewCourse() {
        const name = document.getElementById('new-c-name').value;
        const price = document.getElementById('new-c-price').value;
        courses.push({ id: Date.now(), name, price, lessons: [] });
        saveData();
        renderAdmin();
    }

    function addFullLesson() {
        const cId = document.getElementById('select-course').value;
        const title = document.getElementById('lesson-title').value;
        const video = document.getElementById('video-link').value;
        const quiz = document.getElementById('quiz-data').value;

        const course = courses.find(c => c.id == cId);
        course.lessons.push({ title, video, quiz });
        saveData();
        alert("تمت إضافة الدرس بنجاح");
    }

    function renderAdmin() {
        const sel = document.getElementById('select-course');
        sel.innerHTML = courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        
        const sList = document.getElementById('students-list');
        sList.innerHTML = "<h3>الطلاب (تفعيل/تعطيل):</h3>" + users.map(u => `
            <div class="card">${u.name} - ${u.phone} 
                <button onclick="activateUser('${u.phone}')">${u.active ? 'إيقاف' : 'تفعيل'}</button>
                <button onclick="addCourseToUser('${u.phone}')">+ إضافة كورس</button>
            </div>
        `).join('');
    }

    function activateUser(phone) {
        let u = users.find(x => x.phone === phone);
        u.active = !u.active;
        saveData(); renderAdmin();
    }

    function addCourseToUser(phone) {
        let cId = prompt("أدخل كود الكورس (موجود في بيانات الكورس)");
        let u = users.find(x => x.phone === phone);
        if(!u.myCourses.includes(cId)) u.myCourses.push(cId);
        saveData(); alert("تم تفعيل الكورس للطالب");
    }

    function renderProfile() {
        document.getElementById('student-data').innerHTML = `الاسم: ${currentUser.name} <br> الهاتف: ${currentUser.phone}`;
        const myList = document.getElementById('my-courses-list');
        myList.innerHTML = courses.filter(c => currentUser.myCourses.includes(String(c.id)) || currentUser.isAdmin).map(c => `
            <div class="card" onclick="viewCourse(${c.id})">${c.name} (اضغط للدخول)</div>
        `).join('');
    }

    function viewCourse(id) {
        const course = courses.find(c => c.id == id);
        showPage('course-view');
        document.getElementById('view-c-title').innerText = course.name;
        document.getElementById('lessons-container').innerHTML = course.lessons.map((l, i) => `
            <div class="card">
                <h4>${i+1}. ${l.title}</h4>
                <iframe width="100%" height="315" src="${l.video.replace('watch?v=', 'embed/')}" frameborder="0" allowfullscreen></iframe>
                <button class="btn" onclick="startQuiz('${id}', ${i})">ابدأ الامتحان</button>
            </div>
        `).join('');
    }

    // نظام الواترمارك المتحرك
    function startWatermark() {
        const wm = document.getElementById('watermark');
        wm.style.display = 'block';
        wm.innerText = currentUser.phone + " - " + currentUser.name;
        setInterval(() => {
            wm.style.top = Math.random() * 80 + "%";
            wm.style.left = Math.random() * 80 + "%";
        }, 3000);
    }

    function saveData() {
        localStorage.setItem('es_users', JSON.stringify(users));
        localStorage.setItem('es_courses', JSON.stringify(courses));
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
